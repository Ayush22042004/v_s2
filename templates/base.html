<!doctype html><html><head><meta name=viewport content="width=device-width,initial-scale=1">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet"></head><body>
<nav class="navbar navbar-dark bg-dark px-3"><a class="navbar-brand" href="/">VS²</a>
<div class="ms-auto">
{% if session.get('user') %}
<span class="me-2 small">Hi, {{ session['user']['username'] }}</span>
<a class="btn btn-sm btn-outline-light" href="{{ url_for('logout') }}">Logout</a>
{% else %}<a class="btn btn-sm btn-accent" href="{{ url_for('login') }}">Login</a>{% endif %}
</div></nav>
<div class="container py-3">{% block content %}{% endblock %}</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="{{ url_for('static', filename='js/main.js') }}"></script></body></html>
